<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — جمال سولوشنز</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-900 via-blue-950 to-slate-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl">
        <svg class="w-9 h-9 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h14a2 2 0 012 2v10a2 2 0 01-2 2h-2"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-white">جمال سولوشنز</h1>
      <p class="text-blue-300 text-sm mt-1">منصة الذكاء الاصطناعي المؤسسي</p>
    </div>

    <!-- Card -->
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl p-8 shadow-2xl">
      <h2 class="text-xl font-bold text-white mb-6">تسجيل الدخول</h2>

      {% if error %}
      <div class="bg-red-500/20 border border-red-500/40 text-red-200 rounded-xl px-4 py-3 text-sm mb-5">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/login" class="space-y-5">
        <div>
          <label class="block text-blue-200 text-sm font-medium mb-2">اسم المستخدم</label>
          <input
            type="text"
            name="username"
            required
            placeholder="أدخل اسم المستخدم"
            class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-blue-300/60 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent text-sm"
          />
        </div>
        <div>
          <label class="block text-blue-200 text-sm font-medium mb-2">كلمة المرور</label>
          <input
            type="password"
            name="password"
            required
            placeholder="أدخل كلمة المرور"
            class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-blue-300/60 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:border-transparent text-sm"
          />
        </div>
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition-all duration-200 text-sm shadow-lg hover:shadow-blue-500/25 mt-2"
        >
          دخول إلى المنصة
        </button>
      </form>
    </div>

    <p class="text-center text-blue-400/60 text-xs mt-6">
      © 2024 جمال سولوشنز — جميع الحقوق محفوظة
    </p>
  </div>
</body>
</html>
